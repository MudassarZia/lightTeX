name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check C++ formatting
        run: |
          find src tests -name '*.cpp' -o -name '*.h' | xargs clang-format --dry-run -Werror

  test:
    name: Test (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev libgl1-mesa-dev

      - name: Install Qt (macOS)
        if: runner.os == 'macOS'
        run: brew install qt@6

      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'

      - name: Configure
        run: cmake -B build -DLIGHTTEX_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release
        env:
          QT_QPA_PLATFORM: offscreen

  build-smoke:
    name: Build (${{ matrix.os }})
    needs: [lint, test]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev libgl1-mesa-dev

      - name: Install Qt (macOS)
        if: runner.os == 'macOS'
        run: brew install qt@6

      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DLIGHTTEX_BUILD_TESTS=OFF

      - name: Build Release
        run: cmake --build build --config Release

      - name: Verify binary exists
        shell: bash
        run: |
          if [ -f build/lightTex ] || [ -f build/Release/lightTex.exe ] || [ -f build/lightTex.exe ]; then
            echo "Binary found"
          else
            echo "Binary not found" && exit 1
          fi
