name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.artifact }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: lighttex-linux
          - os: macos-latest
            artifact: lighttex-macos
          - os: windows-latest
            artifact: lighttex-windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev libgl1-mesa-dev

      - name: Install Qt (macOS)
        if: runner.os == 'macOS'
        run: brew install qt@6

      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DLIGHTTEX_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          if [ "$RUNNER_OS" == "Windows" ]; then
            cp build/Release/lightTex.exe dist/ 2>/dev/null || cp build/lightTex.exe dist/
          else
            cp build/lightTex dist/
          fi
          cp -r themes dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          body_path: RELEASE_NOTES.md
          files: artifacts/**/*
